<div class="container">

<div class="row justify-content-center">

<div class="col-lg-5">

<div class="card shadow mt-5">

<div class="card-body">

<h2 class="mb-4">

Register

</h2>

<input

class="form-control mb-3"

placeholder="Full Name"

[(ngModel)]="fullName">

<input

class="form-control mb-3"

placeholder="Email"

[(ngModel)]="email">

<input

type="password"

class="form-control mb-4"

placeholder="Password"

[(ngModel)]="password">

<button

class="btn btn-success w-100"

(click)="register()">

Register

</button>

</div>

</div>

</div>

</div>

</div>
