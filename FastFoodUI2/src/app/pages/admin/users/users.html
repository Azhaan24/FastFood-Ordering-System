<div class="container">

<h2 class="mb-4">

Users

</h2>

<table class="table table-striped">

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Role</th>

<th></th>

</tr>

</thead>

<tbody>

<tr *ngFor="let user of users">

<td>

{{user.fullName}}

</td>

<td>

{{user.email}}

</td>

<td>

{{user.role}}

</td>

<td>

<button

class="btn btn-primary btn-sm"

(click)="makeAdmin(user)"

*ngIf="user.role!='Admin'">

Make Admin

</button>

</td>

</tr>

</tbody>

</table>

</div>
